services:
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    expose:
      - "8080"
    environment:
      SERVER_ADDRESS: ":8080"
      DB_HOST: mysql
      DB_USER: keep_pledge
      DB_PASSWORD: keep_pledge
      DB_NAME: keep_pledge
      REDIS_ADDR: redis:6379
      JWT_SECRET: "pn6AIMYCucGkXTlwftUz3LSy7o4vge1H8OqZmEJQsPiaK9W2hBNxrd0RbFDjV5"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: keep_pledge
      MYSQL_USER: keep_pledge
      MYSQL_PASSWORD: keep_pledge
    volumes:
      - mysql_data:/var/lib/mysql
      - ../backend/docs/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  backend_uploads:
